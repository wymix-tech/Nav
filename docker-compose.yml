services:
  nav:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nav
    ports:
      - "${PORT:-4000}:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - NAV_JWT_SECRET=${NAV_JWT_SECRET}
      - NAV_PASSWORD=${NAV_PASSWORD}
      - NAV_DB_PATH=/data/nav.db
      - NAV_UPLOAD_DIR=/data/uploads
      - NAV_CORS_ORIGIN=${NAV_CORS_ORIGIN:-}
    volumes:
      - nav-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  nav-data:
