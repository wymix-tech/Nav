services:
  nav:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nav
    ports:
      - "${PORT:-4000}:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - NAV_JWT_SECRET=${NAV_JWT_SECRET}
      - NAV_PASSWORD=${NAV_PASSWORD}
      - NAV_DB_PATH=/data/nav.db
      - NAV_UPLOAD_DIR=/data/uploads
      - NAV_CORS_ORIGIN=${NAV_CORS_ORIGIN:-}
      - NAV_AI_BASE_URL=${NAV_AI_BASE_URL:-https://api.openai.com}
      - NAV_AI_API_KEY=${NAV_AI_API_KEY:-}
      - NAV_AI_MODELS=${NAV_AI_MODELS:-gpt-4o-mini}
      - NAV_AI_SYSTEM_PROMPT=${NAV_AI_SYSTEM_PROMPT:-}
    volumes:
      - nav-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  nav-data:
